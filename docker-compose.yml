services:
  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_USER: spark
      POSTGRES_PASSWORD: sparkpass
      POSTGRES_DB: mockdb
    volumes:
      - ./init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spark -d mockdb"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - bigdata_net

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    networks:
      - bigdata_net
    environment:
      CLICKHOUSE_USER: spark
      CLICKHOUSE_PASSWORD: sparkpass
    healthcheck:
      test: ["CMD", "clickhouse-client", "--user", "spark", "--password", "sparkpass", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  spark-etl:
    build:
      context: .
      dockerfile: Dockerfile.spark     
    container_name: spark
    ports:
      - "4040:4040"
    volumes:
      - ./spark:/opt/spark/work-dir
      - ./jars/postgresql-42.7.10.jar:/opt/spark/jars/postgresql-42.7.10.jar
      - ./jars/clickhouse-jdbc-all-0.9.8.jar:/opt/spark/jars/clickhouse-jdbc-all-0.9.8.jar
    networks:
      - bigdata_net
    environment:
      - SPARK_LOCAL_IP=spark
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

networks:
  bigdata_net:
    driver: bridge